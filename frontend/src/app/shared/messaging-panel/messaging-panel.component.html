<!-- Overlay Background -->
<div class="messaging-overlay" [class.visible]="isOpen" (click)="onClose()"></div>

<!-- Slide-out Panel -->
<div class="messaging-panel" [class.open]="isOpen">
  
  <!-- CONVERSATIONS LIST VIEW -->
  <div class="panel-view list-view" [class.hidden]="activeConversation">
    <div class="panel-header">
      <h2>Messages</h2>
      <button class="btn-close" (click)="onClose()" aria-label="Fermer">
        <i class="ph ph-x"></i>
      </button>
    </div>
    
    <div class="panel-search">
      <i class="ph ph-magnifying-glass"></i>
      <input type="text" placeholder="Rechercher une conversation...">
    </div>

    <div class="conversations-list">
      <div class="conversation-item" 
           *ngFor="let conv of conversations" 
           (click)="openConversation(conv)">
        
        <div class="avatar-container">
          <div class="avatar">{{ conv.avatar }}</div>
          <div class="online-indicator" *ngIf="conv.online"></div>
        </div>
        
        <div class="conv-details">
          <div class="conv-header">
            <h4>{{ conv.name }}</h4>
            <span class="time">{{ conv.time }}</span>
          </div>
          <div class="conv-message">
            <p [class.unread-text]="conv.unread > 0">{{ conv.lastMessage }}</p>
            <span class="badge" *ngIf="conv.unread > 0">{{ conv.unread }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ACTIVE CONVERSATION VIEW -->
  <div class="panel-view chat-view" [class.active]="activeConversation">
    
    <div class="panel-header chat-header" *ngIf="activeConversation">
      <button class="btn-back" (click)="closeConversation()" aria-label="Retour">
        <i class="ph ph-arrow-left"></i>
      </button>
      <div class="chat-user-info">
        <div class="avatar-small">{{ activeConversation.avatar }}</div>
        <div>
          <h4>{{ activeConversation.name }}</h4>
          <span class="status" [class.online]="activeConversation.online">
            {{ activeConversation.online ? 'En ligne' : 'Hors ligne' }}
          </span>
        </div>
      </div>
      <button class="btn-action" aria-label="Options">
        <i class="ph ph-dots-three-vertical"></i>
      </button>
    </div>

    <div class="chat-messages">
      <div class="date-divider">Aujourd'hui</div>
      
      <div class="message" *ngFor="let msg of messages" [class.me]="msg.sender === 'me'" [class.them]="msg.sender === 'them'">
        <div class="message-bubble">
          {{ msg.text }}
        </div>
        <span class="message-time">{{ msg.time }}</span>
      </div>
    </div>

    <div class="chat-input-area">
      <button class="btn-attach" aria-label="Joindre un fichier">
        <i class="ph ph-paperclip"></i>
      </button>
      <input type="text" placeholder="Écrivez votre message...">
      <button class="btn-send" aria-label="Envoyer">
        <i class="ph ph-paper-plane-tilt"></i>
      </button>
    </div>

  </div>

</div>
