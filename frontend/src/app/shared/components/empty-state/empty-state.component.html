<div class="empty-state">
  <div class="empty-icon-wrapper">
    <i [class]="icon"></i>
  </div>
  <h4 class="empty-title">{{ title }}</h4>
  <p class="empty-description">{{ description }}</p>
  
  <button class="empty-action-btn" *ngIf="actionLabel" (click)="onActionClick()">
    {{ actionLabel }}
  </button>
</div>
