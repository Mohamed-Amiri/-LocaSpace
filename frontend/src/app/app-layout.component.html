<!-- Sidebar -->
<div class="sidebar" [class.collapsed]="sidebarCollapsed">
  <div class="sidebar-header">
    <a class="sidebar-brand" routerLink="/">
      <div class="brand-icon">
        <i class="ph ph-buildings"></i>
      </div>
      <span class="brand-text" *ngIf="!sidebarCollapsed">LocaSpace</span>
    </a>
  </div>
  
  <nav class="sidebar-nav">
    <ul class="nav-list">
      <!-- Home link -->
      <li class="nav-item">
        <a class="nav-link" routerLink="/">
          <i class="ph ph-house nav-icon"></i>
          <span class="nav-text" *ngIf="!sidebarCollapsed">Accueil</span>
        </a>
      </li>

      <li class="nav-divider" *ngIf="!sidebarCollapsed"></li>

      <li class="nav-item" *ngFor="let item of menuItems">
        <a class="nav-link" 
           [routerLink]="item.route" 
           routerLinkActive="active"
           [routerLinkActiveOptions]="{exact: false}">
          <i [class]="item.icon" class="nav-icon"></i>
          <span class="nav-text" *ngIf="!sidebarCollapsed">{{ item.label }}</span>
        </a>
      </li>
    </ul>
    
    <div class="nav-footer">
      <a class="nav-link logout-link" (click)="logout()">
        <i class="ph ph-sign-out nav-icon"></i>
        <span class="nav-text" *ngIf="!sidebarCollapsed">Déconnexion</span>
      </a>
    </div>
  </nav>
</div>

<!-- Mobile Overlay -->
<div class="sidebar-overlay" 
     [class.visible]="mobileMenuOpen" 
     (click)="closeMobileMenu()">
</div>

<!-- Main Content -->
<div class="main-content" [class.expanded]="sidebarCollapsed">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <i class="ph ph-sidebar-simple"></i>
      </button>
      <div class="breadcrumb-area">
        <h1 class="page-title">{{ pageTitle }}</h1>
      </div>
    </div>
    
    <div class="topbar-right">
      <div class="search-box" *ngIf="showSearch">
        <i class="ph ph-magnifying-glass"></i>
        <input type="text" placeholder="Rechercher..." [(ngModel)]="searchQuery" aria-label="Rechercher">
      </div>
      
      <!-- Messages -->
      <button class="topbar-icon-btn" aria-label="Messages" (click)="toggleMessages()">
        <i class="ph ph-chat-dots"></i>
        <span class="notification-badge">3</span>
      </button>

      <!-- Notification Bell -->
      <button class="topbar-icon-btn" aria-label="Notifications" (click)="toggleNotifications()">
        <i class="ph ph-bell"></i>
        <span class="notification-badge" *ngIf="notificationCount > 0">{{ notificationCount }}</span>
      </button>

      <!-- User Profile -->
      <a class="user-info" routerLink="/profil">
        <div class="user-avatar-initials">
          {{ currentUser.initials }}
        </div>
        <div class="user-details" *ngIf="currentUser.name">
          <span class="user-name">{{ currentUser.name }}</span>
          <span class="user-role">{{ currentUser.role }}</span>
        </div>
        <i class="ph ph-caret-down user-chevron" *ngIf="currentUser.name"></i>
      </a>
    </div>
  </div>

  <!-- Content Container -->
  <div class="content-container">
    <router-outlet></router-outlet>
  </div>
</div>

<!-- Messaging Overlay Panel -->
<app-messaging-panel 
  [isOpen]="messagesOpen" 
  (closePanel)="messagesOpen = false">
</app-messaging-panel>
